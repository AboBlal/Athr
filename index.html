<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق أَثَر | محمد خير أبو بلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #064e3b; 
            --accent: #c5a059;  
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #102a43;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(6, 78, 59, 0.15);
        }

        body.dark-mode {
            --primary: #c5a059;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-dark: #f1f5f9;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            color: var(--text-dark);
            text-align: center;
            transition: all 0.4s ease;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        .app-header {
            background: var(--primary);
            color: var(--accent);
            padding: 50px 20px 80px;
            box-shadow: var(--shadow);
            position: relative;
            border-bottom: 4px solid var(--accent);
            border-radius: 0 0 50% 50% / 0 0 25% 25%;
        }

        .header-main-row { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; position: relative; z-index: 2; }
        .header-title { font-family: 'Amiri', serif; font-size: 38px; margin: 0; }

        .pts-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 18px; border-radius: 50px;
            border: 1px solid var(--accent);
            display: flex; align-items: center; gap: 8px; font-weight: 900;
        }

        .app-content { padding: 20px; margin-top: -50px; position: relative; z-index: 3; max-width: 500px; margin-left: auto; margin-right: auto; }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            display: none;
        }

        .card.active { display: block; animation: slideUp 0.5s ease; }

        @keyframes slideUp { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }

        .btn {
            background: var(--white);
            color: var(--primary);
            border: 2px solid #e2e8f0;
            padding: 16px;
            margin: 10px 0;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }
        .btn-p { background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%); color: var(--accent); border: none; }

        .timer-container { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        #timer-bar { height: 100%; background: var(--accent); width: 100%; transition: 0.1s linear; }

        .correct { border-color: #27ae60 !important; background: #eafff2 !important; color: #27ae60; }
        .wrong { border-color: #c0392b !important; background: #fff0f0 !important; color: #c0392b; }

        .home-btn-fixed {
            background: var(--primary);
            color: var(--accent);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid var(--accent);
            margin: 0 auto 15px;
            transition: 0.3s;
        }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .shop-item {
            background: var(--white); border: 2px solid #edf2f7; padding: 15px 10px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .shop-price { background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: bold; }

        .motto-footer { font-family: 'Amiri', serif; font-size: 16px; color: #64748b; margin-top: 20px; font-style: italic; }
        .ad-space { margin-top: 25px; padding: 12px; background: rgba(0,0,0,0.03); border: 1px dashed var(--accent); border-radius: 12px; font-size: 11px; }

        footer { padding-bottom: 20px; font-size: 13px; color: #718096; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-main-row">
            <h1 class="header-title">أَثَر</h1>
            <div class="pts-badge"><i class="fas fa-coins"></i> <span id="pts-val">0</span></div>
        </div>
        <p id="rank-tag" style="margin-top: 10px; font-weight: bold; color: var(--accent);">اللقب: طالب علم</p>
    </div>

    <div class="app-content">
        <div id="scr-home" class="card active">
            <div style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"><i class="fas fa-mosque"></i></div>
            <h2>تطبيق أَثَر</h2>
            <button class="btn btn-p" onclick="showCard('scr-modes')">ابدأ اللعب</button>
            <button class="btn" onclick="showCard('scr-shop')">المتجر الملكي</button>
            <div class="ad-space">إعلان (Google AdSense)</div>
        </div>

        <div id="scr-modes" class="card">
            <h3>اختر طور اللعب</h3>
            <button class="btn" onclick="setMode('solo')">الطور التقليدي</button>
            <button class="btn" onclick="setMode('speed')">سباق الزمن ⚡</button>
            <button class="btn" onclick="setMode('survival')">طور البقاء 🛡️</button>
            <button class="btn" onclick="setMode('group')">تحدي لاعبين 👥</button>
            <button onclick="showCard('scr-home')" style="background:none; border:none; color:#777; cursor:pointer; margin-top:10px;">🔙 رجوع</button>
        </div>

        <div id="scr-levels" class="card">
            <h3>اختر القسم</h3>
            <button class="btn" onclick="startGame('prophets')">✨ قصص الأنبياء</button>
            <button class="btn" onclick="startGame('aqida')">⭐ العقيدة والتوحيد</button>
            <button class="btn" onclick="startGame('sira')">🌱 السيرة النبوية</button>
<button class="btn" onclick="startGame('salafi')">🕌 العقيدة والسلف</button>
<button class="btn" onclick="startGame('hanbali')">⚖️ الفقه الحنبلي</button>
<button class="btn" onclick="startGame('shafi')">📜 الفقه الشافعي</button>
<button class="btn" onclick="startGame('hadith')">📖 الحديث الشريف</button>
            <button onclick="showCard('scr-modes')" style="background:none; border:none; color:#777; cursor:pointer; margin-top:10px;">🔙 رجوع</button>
        </div>

        <div id="scr-game" class="card">
            <div class="home-btn-fixed" onclick="endGame()"><i class="fas fa-home"></i></div>
            <div id="game-info" style="font-size: 14px; color: var(--accent); margin-bottom: 10px;"></div>
            <div class="timer-container" id="t-cont"><div id="timer-bar"></div></div>
            <h3 id="q-txt">...</h3>
            <div id="opt-container"></div>
            <div class="ad-space">إعلان (Google AdSense)</div>
        </div>

        <div id="scr-shop" class="card">
            <h3>🛒 المتجر الملكي</h3>
            <p>نقاطك: <span id="shop-pts">0</span> 🪙</p>
            <div class="shop-grid">
                <div class="shop-item" onclick="buy('dark', 300)">
                    <i class="fas fa-moon"></i><b>الوضع الليلي</b><span class="shop-price">300 🪙</span>
                </div>
                <div class="shop-item" onclick="buy('hint', 200)">
                    <i class="fas fa-lightbulb"></i><b>5 تلميحات</b><span class="shop-price">200 🪙</span>
                </div>
            </div>
            <button onclick="showCard('scr-home')" style="background:none; border:none; color:#777; cursor:pointer; margin-top:20px;">🔙 رجوع</button>
        </div>

        <div class="motto-footer">نعتذر عن الخطأ فالعصمة لله وحده</div>
    </div>

    <footer><p>&copy; 2026 محمد خير أبو بلال</p></footer>

    <script>
        const DB = {
            prophets: [
                           {q:"من هو النبي الذي أُلقي في النار ولم تحرقه؟", a:"إبراهيم عليه السلام", w:["لوط","شعيب","هود"]},
{q:"من هو النبي الذي لُقب بـ 'ذو النون'؟", a:"يونس عليه السلام", w:["إلياس","يسع","زكريا"]},
{q:"من هو النبي الذي كان يعمل نجاراً؟", a:"زكريا عليه السلام", w:["آدم","نوح","موسى"]},
{q:"من هو النبي الذي قبضت روحه في السماء الرابعة؟", a:"إدريس عليه السلام", w:["عيسى","يحيى","شيث"]},
{q:"من هو النبي الذي كان صوته جميلاً جداً في التسبيح؟", a:"داوود عليه السلام", w:["سليمان","أيوب","هارون"]},
{q:"من هو النبي الذي أُرسل إلى أهل مَدين؟", a:"شعيب عليه السلام", w:["صالح","هود","لوط"]},
{q:"كم لبث نوح عليه السلام يدعو قومه؟", a:"950 سنة", w:["1000 سنة","500 سنة","800 سنة"]},
{q:"من هو النبي الذي كفل مريم عليها السلام؟", a:"زكريا عليه السلام", w:["يحيى","عيسى","إبراهيم"]},
                {q:"من هو النبي الذي ابتلعه الحوت؟", a:"يونس عليه السلام", w:["يوسف","موسى","نوح"]},
                {q:"من هو النبي الملقب بخليل الله؟", a:"إبراهيم عليه السلام", w:["موسى","عيسى","نوح"]},
                {q:"من النبي الذي بنى السفينة؟", a:"نوح عليه السلام", w:["هود","صالح","لوط"]}
            ],
            aqida: [
{q:"ما هو أعظم ذنب يمكن أن يرتكبه الإنسان؟", a:"الشرك بالله", w:["القتل","السرقة","عقوق الوالدين"]},
{q:"ما هو الركن الثاني من أركان الإسلام؟", a:"إقام الصلاة", w:["إيتاء الزكاة","صوم رمضان","حج البيت"]},
{q:"ما معنى كلمة 'التوحيد'؟", a:"إفراد الله بالعبادة", w:["كثرة التسبيح","حفظ القرآن","حب المساجد"]},
{q:"كم عدد أركان الإسلام؟", a:"5 أركان", w:["6 أركان","4 أركان","7 أركان"]},
{q:"الإيمان بالكتب السماوية هو الركن الـ... من أركان الإيمان؟", a:"الثالث", w:["الثاني","الرابع","الخامس"]},
{q:"من هو الملك الموكل بإنزال المطر؟", a:"ميكائيل عليه السلام", w:["جبريل","إسرافيل","رضوان"]},
                {q:"كم عدد أركان الإيمان؟", a:"6", w:["5","7","4"]},
                {q:"ما هو الركن الأول من أركان الإسلام؟", a:"الشهادتان", w:["الصلاة","الزكاة","الصوم"]}
            ],
            sira: [
{q:"ما اسم مرضعة النبي ﷺ؟", a:"حليمة السعدية", w:["ثويبة","أم أيمن","فاطمة"]},
{q:"في أي شهر ولد النبي ﷺ؟", a:"ربيع الأول", w:["رمضان","رجب","محرم"]},
{q:"كم عدد غزوات النبي ﷺ؟", a:"27 غزوة", w:["15 غزوة","30 غزوة","20 غزوة"]},
{q:"ما هو اسم الغار الذي نزل فيه الوحي أول مرة؟", a:"غار حراء", w:["غار ثور","غار أحد","غار تبوك"]},
{q:"من هو عم النبي ﷺ الذي استشهد في أحد؟", a:"حمزة بن عبد المطلب", w:["العباس","أبو طالب","أبو لهب"]},
{q:"ما اسم زوجة النبي ﷺ التي لُقبت بأم المساكين؟", a:"زينب بنت خزيمة", w:["عائشة","حفصة","خديجة"]},
                {q:"أين ولد النبي ﷺ؟", a:"مكة المكرمة", w:["المدينة","الطائف","اليمن"]},
                {q:"ما اسم أم النبي ﷺ؟", a:"آمنة بنت وهب", w:["حليمة","خديجة","فاطمة"]}
            ],
salafi: [
  {q:"ما هو المصدر الأول للتلقي عند السلف؟", a:"القرآن والسنة", w:["العقل فقط","المنطق","أقوال الفلاسفة"]},
  {q:"ما معنى كلمة 'السلف الصالح'؟", a:"الصحابة والتابعين وتابعيهم", w:["المتأخرين","علماء العصر الحديث","اليونانيون"]},
  {q:"من هو الإمام الذي لُقب بـ 'إمام أهل السنة' في فتنة خلق القرآن؟", a:"أحمد بن حنبل", w:["الشافعي","مالك","أبو حنيفة"]},
  {q:"أين يثبت السلف صفة 'العلُو' لله تعالى؟", a:"فوق العرش", w:["في كل مكان بذاته","لا مكان له","داخل المخلوقات"]},
  {q:"ما هو أصل الدين وأول واجب على المكلف عند السلف؟", a:"التوحيد", w:["الشك","النظر والاستدلال","المعرفة الفطرية فقط"]},
  {q:"من ألف كتاب 'العقيدة الواسطية'؟", a:"ابن تيمية", w:["ابن القيم","ابن كثير","البخاري"]},
  {q:"ما حكم طاعة ولي الأمر في غير معصية عند السلف؟", a:"واجبة", w:["محرمة","مستحبة","مخيرة"]},
  {q:"ما هو موقف السلف من الصحابة الكرام؟", a:"محبتهم والترضي عنهم جميعاً", w:["سبهم","تفضيل بعضهم وذم الآخرين","عدم الاهتمام بهم"]}

],
hanbali: [
  {q:"من هو إمام المذهب الحنبلي؟", a:"أحمد بن حنبل", w:["الشافعي","مالك","أبو حنيفة"]},
  {q:"ما هو الكتاب الذي جمع فيه الإمام أحمد الأحاديث؟", a:"المسند", w:["الموطأ","السنن","الصحيح"]},
  {q:"ما حكم قراءة البسملة جهراً في الصلاة عند الحنابلة؟", a:"الإسرار بها أفضل", w:["واجبة جهرًا","محرمة","سنة جهرًا"]},
  {q:"ما هو المعتمد في المذهب للحكم بالبلوغ بالسن؟", a:"تمام 15 سنة", w:["12 سنة","18 سنة","20 سنة"]},
{q:"ما هو الكتاب الذي يعتبر العمدة في الفقه الحنبلي للمبتدئين؟", a:"عمدة الفقه", w:["الروض المربع","المغني","الإنصاف"]},
{q:"ما حكم مسح الرأس في الوضوء عند الحنابلة؟", a:"يجب مسحه كله", w:["مسح بعضه","مسح شعرة واحدة","سنة"]},
{q:"ما هي الكفارة الكبرى عند الحنابلة في الصيام؟", a:"الجماع في نهار رمضان", w:["الأكل عمداً","شرب الماء","القيء"]},
{q:"كم عدد الصلوات التي يجوز جمعها في السفر عند الحنابلة؟", a:"الظهر مع العصر والمغرب مع العشاء", w:["كل الصلوات","الفجر مع الظهر","لا يجوز الجمع"]}
],
shafi: [
  {q:"ما هو الكتاب الأم في فقه الإمام الشافعي؟", a:"كتاب الأم", w:["الرسالة","المنهاج","المجموع"]},
  {q:"ما حكم قراءة الفاتحة للمأموم في الصلاة الجهرية عند الشافعية؟", a:"واجبة", w:["سنة","مكروهة","ليست واجبة"]},
  {q:"ما هو القنوت الذي يلتزم به الشافعية يومياً؟", a:"قنوت الفجر", w:["قنوت الظهر","قنوت المغرب","لا يوجد قنوت"]},
  {q:"كم عدد أركان الصلاة عند الشافعية؟", a:"13 ركناً", w:["17 ركناً","10 أركان","5 أركان"]},
{q:"من هو تلميذ الإمام الشافعي الذي نقل عنه المذهب في مصر؟", a:"المزني", w:["أحمد بن حنبل","البويطي","الربيع المرادي"]},
{q:"ما هو 'القول القديم' للإمام الشافعي؟", a:"ما صنفه في العراق", w:["ما صنفه في مصر","ما قاله في مكة","ما تراجع عنه"]},
{q:"ما حكم النية في الوضوء عند الشافعية؟", a:"ركن واجب", w:["سنة مستحبة","مباحة","ليست شرطاً"]},
{q:"ما هي المسافة التي تبيح قصر الصلاة عند الشافعية؟", a:"16 فرسخاً (81 كم تقريباً)", w:["20 كم","50 كم","100 كم"]}
],
hadith: [
  {q:"من هو الملقب بـ 'أمير المؤمنين في الحديث'؟", a:"البخاري", w:["مسلم","الترمذي","ابن ماجه"]},
  {q:"ما هو أصح كتاب بعد القرآن الكريم؟", a:"صحيح البخاري", w:["سنن أبي داود","صحيح مسلم","موطأ مالك"]},
  {q:"ما معنى حديث 'متفق عليه'؟", a:"رواه البخاري ومسلم", w:["رواه أصحاب السنن","اتفق عليه العلماء","رواه أحمد"]},
  {q:"ما هو الحديث الذي نقله جمع عن جمع تستحيل عاداتهم تواطؤهم على الكذب؟", a:"المتواتر", w:["الآحاد","الغريب","الضعيف"]},
{q:"ماذا يسمى الحديث الذي يرويه النبي ﷺ عن ربه عز وجل؟", a:"الحديث القدسي", w:["الحديث المرفوع","الحديث الموقوف","الحديث المرسل"]},
{q:"من هو أكثر الصحابة رواية للحديث الشريف؟", a:"أبو هريرة", w:["عبد الله بن عمر","أنس بن مالك","عائشة رضي الله عنها"]},
{q:"ما هو الكتاب الذي يسمى 'الجامع الصحيح'؟", a:"صحيح البخاري", w:["صحيح مسلم","جامع الترمذي","سنن النسائي"]},
{q:"ما هو الحديث 'المعضل'؟", a:"ما سقط من إسناده راويان فأكثر على التوالي", w:["ما سقط راوٍ واحد","ما رواه كذاب","ما خالف فيه الثقة غيره"]}
]
        };

        let pts = parseInt(localStorage.getItem('ath_pts')) || 0;
        let gameMode = 'solo', pool = [], active = true, timer, turn = 1, scores = {1:0, 2:0};

        function sync() { 
            document.getElementById('pts-val').innerText = pts; 
            document.getElementById('shop-pts').innerText = pts;
            localStorage.setItem('ath_pts', pts);
        }
        sync();

        function showCard(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setMode(m) { gameMode = m; showCard('scr-levels'); }

        function startGame(lvl) {
            pool = [...DB[lvl]].sort(() => Math.random() - 0.5);
            scores = {1:0, 2:0}; turn = 1;
            document.getElementById('t-cont').style.display = (gameMode === 'speed') ? 'block' : 'none';
            if(gameMode === 'speed') startTimer();
            showCard('scr-game');
            next();
        }

        function startTimer() {
            let t = 30; clearInterval(timer);
            timer = setInterval(() => {
                t--; document.getElementById('timer-bar').style.width = (t/30)*100 + "%";
                if(t<=0) endGame();
            }, 1000);
        }

        function next() {
            if(pool.length === 0) { endGame(); return; }
            active = true;
            let qD = pool.pop();
            document.getElementById('game-info').innerText = (gameMode === 'group') ? `دور اللاعب: ${turn}` : "";
            document.getElementById('q-txt').innerText = qD.q;
            const box = document.getElementById('opt-container'); box.innerHTML = "";
            [qD.a, ...qD.w].sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('button'); b.className = "btn"; b.innerText = opt;
                b.onclick = () => {
                    if(!active) return; active = false;
                    if(opt === qD.a) {
                        b.classList.add('correct'); pts += 10; if(gameMode === 'group') scores[turn] += 10;
                        sync(); setTimeout(() => { if(gameMode==='group') turn = (turn===1)?2:1; next(); }, 700);
                    } else {
                        b.classList.add('wrong');
                        if(gameMode === 'survival') endGame();
                        else setTimeout(() => { if(gameMode==='group') turn = (turn===1)?2:1; next(); }, 700);
                    }
                };
                box.appendChild(b);
            });
        }

        function endGame() {
            clearInterval(timer);
            alert(gameMode === 'group' ? `النتيجة - لاعب 1: ${scores[1]} | لاعب 2: ${scores[2]}` : "انتهت الجولة");
            showCard('scr-home');
        }

        function buy(i, c) { 
            if(pts >= c) { pts -= c; sync(); if(i==='dark') document.body.classList.toggle('dark-mode'); alert('تم الشراء!'); } 
            else alert('النقاط لا تكفي');
        }
    </script>
